<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up de Succès</title>
    <style>
        /* Style pour la boîte modale */
        .modal {
            display: none; /* Masquer par défaut */
            position: fixed; /* Rester en place */
            z-index: 1; /* Rester au-dessus */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto; /* Activer le défilement si nécessaire */
            background-color: rgba(0,0,0,0.4); /* Fond sombre */
        }

        /* Style pour le contenu de la boîte modale */
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; /* 15% du haut et centré */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* Largeur */
            max-width: 400px;
            text-align: center;
            border-radius: 10px;
        }

        /* Style pour le bouton de fermeture */
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .modal-message {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Le bouton pour ouvrir le pop-up -->
<button id="openModalBtn">Ouvrir le Pop-up</button>

<!-- La boîte modale -->
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <p class="modal-message">INSCRIPTION REUSSI ! VEUILLEZ VOUS CONNECTER !</p>
    </div>
</div>

<script>
    // Obtenir les éléments
    var modal = document.getElementById("myModal");
    var btn = document.getElementById("openModalBtn");
    var span = document.getElementsByClassName("close")[0];

    // Ouvrir le pop-up lorsque l'utilisateur clique sur le bouton
    btn.onclick = function() {
        modal.style.display = "block";
    }

    // Fermer le pop-up lorsque l'utilisateur clique sur <span> (x)
    span.onclick = function() {
        modal.style.display = "none";
    }

    // Fermer le pop-up lorsque l'utilisateur clique en dehors de la boîte modale
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
